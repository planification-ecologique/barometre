name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  # Domaine custom (vide = désactivé, ex. pendant un incident DNS) → repli sur le github.io du dépôt
  CUSTOM_DOMAIN: ${{ vars.PAGES_CUSTOM_DOMAIN }}
  PAGES_BASE_URL: ${{ vars.PAGES_CUSTOM_DOMAIN && format('https://{0}', vars.PAGES_CUSTOM_DOMAIN) || 'https://planification-ecologique.github.io/barometre' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ env.PAGES_BASE_URL }}/
    steps:
      - uses: actions/checkout@v4

      - name: Remove stale CNAME when custom domain is disabled
        if: ${{ env.CUSTOM_DOMAIN == '' }}
        run: |
          if git ls-remote --exit-code --heads origin gh-pages > /dev/null 2>&1; then
            git fetch origin gh-pages --depth=1
            git worktree add /tmp/gh-pages-cname origin/gh-pages
            if [ -f /tmp/gh-pages-cname/CNAME ]; then
              cd /tmp/gh-pages-cname
              git checkout -B gh-pages
              git rm CNAME
              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git commit -m "Remove CNAME (custom domain disabled)"
              git push origin gh-pages
            fi
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '21'
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      # Racine si domaine custom (var ou CNAME gh-pages), sinon /barometre/ pour github.io/barometre/
      - name: Resolve public path prefix
        id: pages-prefix
        run: |
          if [ -n "${CUSTOM_DOMAIN}" ]; then
            echo "prefix=" >> "$GITHUB_OUTPUT"
            echo "Root publicPath (PAGES_CUSTOM_DOMAIN=${CUSTOM_DOMAIN})"
            exit 0
          fi
          git fetch origin gh-pages --depth=1 2>/dev/null || true
          cname_on_pages="$(git show origin/gh-pages:CNAME 2>/dev/null | tr -d '\r\n' || true)"
          if [ -n "${cname_on_pages}" ]; then
            echo "prefix=" >> "$GITHUB_OUTPUT"
            echo "Root publicPath (gh-pages CNAME=${cname_on_pages})"
          else
            echo "prefix=/barometre" >> "$GITHUB_OUTPUT"
            echo "Subpath publicPath /barometre (github.io fallback)"
          fi

      - name: Build for GitHub Pages
        working-directory: app
        env:
          VUE_APP_PREFIX_PATH: ${{ steps.pages-prefix.outputs.prefix }}
          VUE_APP_ENV: prod
          VUE_APP_TRACKING: ${{ vars.VUE_APP_TRACKING || 'phdd.barometre.planification-ecologique.gouv.fr' }}
          VUE_APP_ECOLAB_API_TOKEN: ${{ secrets.VUE_APP_ECOLAB_API_TOKEN }}
        run: npm run build:pages

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: app/dist
          cname: ${{ env.CUSTOM_DOMAIN }}
          keep_files: true
