name: Preview GitHub Pages

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: preview-pages-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    env:
      REPO_NAME: ${{ github.event.repository.name }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_PATH: pr/${{ github.event.pull_request.number }}
      PREVIEW_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr/${{ github.event.pull_request.number }}/

    steps:
      - name: Comment — deployment started
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ env.PR_NUMBER }}
          body: |
            ## GitHub Pages preview

            Building preview for commit `${{ github.event.pull_request.head.sha }}`…
          edit-mode: replace

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '21'
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build preview
        working-directory: app
        env:
          VUE_APP_PREFIX_PATH: /${{ env.REPO_NAME }}/pr/${{ env.PR_NUMBER }}/
          VUE_APP_ENV: prod
          VUE_APP_TRACKING: ${{ vars.VUE_APP_TRACKING || '' }}
          VUE_APP_ECOLAB_API_TOKEN: ${{ secrets.VUE_APP_ECOLAB_API_TOKEN }}
        run: npm run build:pages

      - name: Deploy preview
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: app/dist
          destination_dir: ${{ env.PR_PATH }}
          keep_files: true

      - name: Comment — preview ready
        if: success()
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ env.PR_NUMBER }}
          body: |
            ## GitHub Pages preview

            Preview ready for commit `${{ github.event.pull_request.head.sha }}`:

            **${{ env.PREVIEW_URL }}**

            Changes may take 1–2 minutes to propagate.
          edit-mode: replace

      - name: Comment — deployment failed
        if: failure()
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ env.PR_NUMBER }}
          body: |
            ## GitHub Pages preview

            Preview deployment failed for commit `${{ github.event.pull_request.head.sha }}`.

            Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.
          edit-mode: replace
