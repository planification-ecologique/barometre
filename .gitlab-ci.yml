workflow:
  rules:
    - if: '$CI_COMMIT_REF_NAME == "qualif"'
      variables:
        ENV_CONTEXT: "$CI_COMMIT_REF_NAME"
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
      variables:
        ENV_CONTEXT: "prod"

stages:
  - build_frontend
  - build_nginx
  - extract_var_helm
  - build_helm
  - deploy

variables:
    IMAGE_TAG_NAME_LATEST: "barometre-sgpe-$ENV_CONTEXT:latest"
    IMAGE_TAG_NAME_COMMIT_SHA: "barometre-sgpe-$ENV_CONTEXT:$CI_COMMIT_SHORT_SHA"
    IMAGE_NAME: "$CI_REGISTRY_IMAGE/$IMAGE_TAG_NAME_COMMIT_SHA"
    IMAGE_NAME_LATEST: "$CI_REGISTRY_IMAGE/$IMAGE_TAG_NAME_LATEST"
    KUBE_CONTEXT: cgdd/sri/ecolab/indicateurs-territoriaux/tableau-de-bord-de-la-planification-ecologique-sgpe/k8s-connection:k8s-connection-$ENV_CONTEXT

# IMAGE ---
build_frontend:
  stage: build_frontend
  image: node:21.7-bullseye-slim
  script:
    - cd app && npm install
    - npm run build_$ENV_CONTEXT
    - tar czvf dist.tar.gz dist/
    - pwd
    - ls -l
  artifacts:
    paths: 
      - /builds/cgdd/sri/ecolab/indicateurs-territoriaux/tableau-de-bord-de-la-planification-ecologique-sgpe/sgpe-app/app/dist.tar.gz
    expose_as: 'vuejs dashboard dist'
    expire_in: 2 hrs
  rules:
    changes:
      - app/**/*

build_nginx:
  stage: build_nginx
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [ "" ]
  before_script:
    - echo $CI_REGISTRY_USER
    - echo $CI_REGISTRY_IMAGE
    - cd ./app/
    - tar zxvf  dist.tar.gz
    - cd ..
  script:
    - |
      /kaniko/executor --context $CI_PROJECT_DIR \
        --destination $IMAGE_NAME \
        --destination $IMAGE_NAME_LATEST \
        --dockerfile $CI_PROJECT_DIR/Dockerfile

# DEPLOY ---
# This Stage extract the name and version package from Helm Chart..
Extract-Data:
  stage: extract_var_helm
  image: python
  script:
    - python3 ./devTools/get_variables.py -d app-front-chart -e $ENV_CONTEXT
    - cat build.env
  artifacts:
    reports:
      dotenv: build.env

# This Stage will create a package from Helm Chart that can push on package registry.
Publish-Helm-Package:
  stage: build_helm
  image: 
    name: alpine/helm:latest
    entrypoint: ['']
  script:
    - echo "Build Started"
    - echo ${CI_PROJECT_ID}
    - echo $CI_API_V4_URL
    - echo $PACKAGE_NAME
    - echo $PACKAGE_VERSION
    - helm package $CI_PROJECT_DIR/$PACKAGE_NAME
    - 'curl --request POST --user gitlab-ci-token:$CI_REGISTRY_PASSWORD --form "chart=@${PACKAGE_VERSION}" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/helm/api/stable/charts"'
    - echo "Chart Package Published to Gitlab package registry"
  rules:
    changes:
      - app-front-chart/**/*

# This Stage will Deploy Helm Chart to K8S Cluster
Deploy-Helm-Chart:
  stage: deploy
  image: 
    name: dtzar/helm-kubectl
    entrypoint: ['']
  script:
    - echo "Deployment Started"
    - kubectl config get-contexts
    - kubectl config use-context $KUBE_CONTEXT
    - helm repo add --username $CI_REGISTRY_USER --password $CI_REGISTRY_PASSWORD login-project "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/helm/stable"
    - helm repo update 
    - helm repo list
    - helm list -n $NAMESPACE
    - helm install --dry-run ${HELM_NAME} login-project/${PACKAGE_NAME} --values  ${PACKAGE_NAME}/values_$ENV_CONTEXT.yaml --namespace $NAMESPACE
    - helm upgrade --install ${HELM_NAME} login-project/${PACKAGE_NAME} --values  ${PACKAGE_NAME}/values_$ENV_CONTEXT.yaml --namespace $NAMESPACE
    - kubectl get pods -n $NAMESPACE
    - kubectl get svc -n $NAMESPACE


