#Environement
env:
  name: prod

namespace:
  name: app-front-prod

#Service
service:
  port: 9080
  targetPort: 9080

#Deployment
replicaCount: 1

image:
  repository: gitlab.seenovate.com:5050/sgpe/sgpe/sgpe-app/barometre-sgpe-prod
  tag: "0.0.1"
  containerPort: 9080

imagePullSecrets:
  name: regcred

# Ingress
ingress:
  cluster_issuer: letsencrypt-production
  path: /
  hosts:
    - barometre-sgpe.seenovate.com
  tls:
   - secretName: barometre-sgpe.seenovate.com-tls
     hosts:
      - barometre-sgpe.seenovate.com

ingressexternal:
  path: /
  hosts:    
    - barometre.planification-ecologique.gouv.fr
    - www.barometre.planification-ecologique.gouv.fr
  tls:
   - secretName: planification-ecologique.gouv.fr-cert
     hosts:      
      - barometre.planification-ecologique.gouv.fr
      - www.barometre.planification-ecologique.gouv.fr

# Certificate
secret:
    crt_client:
      create: false # passer à true uniquement si besoin de recréer
      crt: Remplir avec Psono/SGPE/SGPE Production/Certificats/planification-ecologique.gouv.fr.crt en base64
      key: Remplir avec Psono/SGPE/SGPE Production/Certificats/planification-ecologique.gouv.fr.key en base64
